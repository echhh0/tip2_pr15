events {}

http {
  upstream auth_upstream {
    server auth:8081;
  }

  upstream tasks_upstream {
    server tasks_1:8082 max_fails=1 fail_timeout=5s;
    server tasks_2:8082 max_fails=1 fail_timeout=5s;
    keepalive 32;
  }

  upstream grafana_upstream {
    server grafana:3000;
  }

  upstream graphql_upstream {
    server graphql:8090;
  }

  map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
  }

  server {
    listen 8080;
    server_name localhost;

    client_max_body_size 10m;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Request-ID $http_x_request_id;
    proxy_set_header Authorization $http_authorization;
    proxy_next_upstream error timeout invalid_header http_502 http_503 http_504;

    location /v1/auth/ {
      proxy_pass http://auth_upstream;
    }

    location /metrics {
      proxy_pass http://tasks_upstream/metrics;
    }

    location = /grafana {
      return 301 /grafana/;
    }

    location /grafana/ {
      proxy_pass http://grafana_upstream;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-Host $host;
      proxy_set_header X-Forwarded-Server $host;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
    }

    location / {
      proxy_pass http://tasks_upstream;
    }

    location = /graphql {
      return 301 /graphql/;
    }

    location /graphql/ {
      proxy_pass http://graphql_upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }
}